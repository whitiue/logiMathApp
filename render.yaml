services:
  - type: web
    name: logimath-backend
    runtime: docker
    dockerfilePath: ./src/BackEnd/Dockerfile
    dockerContext: ./
    region: oregon
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logimath_db
          property: connectionString
      - key: ENVIRONMENT
        value: production

databases:
  - name: logimath_db
    databaseName: logimath_db
    user: logimath_user
    region: oregon